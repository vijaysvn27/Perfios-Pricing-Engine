name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # NOTE: This repo has no committed package-lock.json yet — it was bootstrapped
      # on a machine without Node/npm, so the lockfile could not be generated locally.
      # `npm ci` REQUIRES a committed lockfile and would fail here, so we use
      # `npm install`. The generated lockfile is uploaded as an artifact below;
      # commit it to the repo and switch this step to `npm ci` for reproducible installs.
      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Run engine tests
        run: npm test

      - name: Type-check and build
        run: npm run build

      - name: Upload generated package-lock.json
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: package-lock
          path: package-lock.json
          if-no-files-found: warn

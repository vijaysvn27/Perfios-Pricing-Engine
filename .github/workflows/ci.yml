name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

# The dev machine cannot run Node (endpoint security) or reach api.github.com,
# but plain git transport works — so this workflow publishes its full output to
# the `ci-logs` branch, which the dev machine reads back with `git fetch`.
permissions:
  contents: write

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install --no-audit --no-fund 2>&1 | tee ci-build.log

      - name: Run engine tests
        id: tests
        continue-on-error: true
        run: |
          set -o pipefail
          npm test 2>&1 | tee -a ci-build.log

      - name: Type-check and build
        id: build
        continue-on-error: true
        run: |
          set -o pipefail
          npm run build 2>&1 | tee -a ci-build.log

      - name: Publish log to ci-logs branch
        if: always()
        run: |
          git config user.name "ci-bot"
          git config user.email "ci-bot@users.noreply.github.com"
          git checkout --orphan ci-logs
          git reset
          git add -f ci-build.log
          git commit -m "CI log for ${GITHUB_SHA} (tests: ${{ steps.tests.outcome }}, build: ${{ steps.build.outcome }})"
          git push -f origin ci-logs

      - name: Fail workflow if any step failed
        if: steps.tests.outcome == 'failure' || steps.build.outcome == 'failure'
        run: exit 1
